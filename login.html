{% extends 'base.html' %}

{% block content %}
<section class="auth card">
    <h2>Login</h2>
    <form method="POST" class="form-grid">
        <label>Email
            <input type="email" name="email" required />
        </label>
        <label>Password
            <input type="password" name="password" required />
        </label>
        <button type="submit" class="btn">Login</button>
    </form>
</section>
{% endblock %}
